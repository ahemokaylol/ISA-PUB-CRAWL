<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Crawl Challenge Tracker</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background: #172840; 
            color: #e0e0e0; 
        }
        h1 { text-align: center; color: #a0d8ff; margin-bottom: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button { 
            padding: 14px; 
            margin: 8px 0; 
            width: 100%; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        button { 
            background: #2a7de1; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:hover { background: #3a8ef2; }
        
        .section { 
            background: #103152; 
            padding: 18px; 
            margin: 20px 0; 
            border-radius: 12px; 
        }
        .challenge { 
            display: flex; 
            align-items: flex-start; 
            padding: 14px; 
            background: #1e3a5f; 
            margin: 8px 0; 
            border-radius: 10px; 
        }
        .challenge input { 
            margin-right: 15px; 
            margin-top: 4px; 
            transform: scale(1.5); 
            flex-shrink: 0; 
        }
        .challenge label { 
            flex: 1; 
            line-height: 1.35; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            background: #103152; 
        }
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #2a4a7a; 
        }
        th { background: #2a7de1; color: white; }
        .tab { display: none; }
        .tab.active { display: block; }
        .nav { display: flex; justify-content: center; margin: 20px 0; gap: 10px; }
        .points-header { 
            color: #a0d8ff; 
            font-size: 1.4em; 
            margin: 10px 0 15px 0; 
            text-align: center; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍻 Pub Crawl Challenge Tracker</h1>
        
        <div class="nav">
            <button onclick="showTab(1)">My Progress</button>
            <button onclick="showTab(2)">Leaderboard</button>
        </div>

        <div id="tab1" class="tab active">
            <input type="text" id="playerName" placeholder="Your name / nickname" />
            <button onclick="saveName()">Join / Load Progress</button>
            
            <div id="challengesList"></div>
            
            <div class="section" style="margin-top:25px; text-align:center;">
                <strong>🍺 Drinks so far:</strong> 
                <input type="number" id="drinkCount" value="0" min="0" style="width:100px; display:inline-block;" onchange="updateDrinks()">
            </div>
            
            <button onclick="submitProgress()" style="background:#00b36b;">✅ Save Progress</button>
        </div>

        <div id="tab2" class="tab">
            <button onclick="refreshLeaderboard()" style="margin-bottom:15px;">🔄 Refresh Leaderboard</button>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        let players = {};
        let currentPlayer = '';

        try {
            players = JSON.parse(localStorage.getItem('pubCrawlPlayers')) || {};
            currentPlayer = localStorage.getItem('currentPlayer') || '';
        } catch(e) {}

        const challenges = [
            // 1 POINT
            {group: "1pt", id: 1, name: "Photobomb a stranger's photo", points: 1},
            {group: "1pt", id: 2, name: "Selfie with the drunkest person", points: 1},
            {group: "1pt", id: 3, name: "Record & post a TikTok/Reel", points: 1},
            {group: "1pt", id: 4, name: "Beat stranger at rock-paper-scissors", points: 1},
            {group: "1pt", id: 5, name: "Compliment outfit + photo together", points: 1},
            {group: "1pt", id: 6, name: "Learn 'cheers' in another language", points: 1},
            {group: "1pt", id: 7, name: "Convince stranger you're from another country", points: 1},
            {group: "1pt", id: 8, name: "Ask stranger for drink recommendation", points: 1},
            {group: "1pt", id: 9, name: "Sit at random table for group photo", points: 1},
            {group: "1pt", id: 10, name: "Ask stranger what your 'vibe' is", points: 1},

            // 3 POINTS
            {group: "3pt", id: 11, name: "Serenade a stranger", points: 3},
            {group: "3pt", id: 12, name: "Win a chug competition", points: 3},
            {group: "3pt", id: 13, name: "Order drink in weirdest accent", points: 3},
            {group: "3pt", id: 14, name: "Ask for lighter then act like monkey", points: 3},
            {group: "3pt", id: 15, name: "Dance Macarena with 3+ strangers", points: 3},
            {group: "3pt", id: 16, name: "Start conga line with 3+ strangers", points: 3},
            {group: "3pt", id: 17, name: "Fake-propose to a stranger", points: 3},
            {group: "3pt", id: 18, name: "Pose like movie poster with stranger", points: 3},
            {group: "3pt", id: 19, name: "5-second dance battle", points: 3},
            {group: "3pt", id: 20, name: "Get motivational speech on camera", points: 3},

            // 5 POINTS
            {group: "5pt", id: 21, name: "Get a free drink from a stranger", points: 5},
            {group: "5pt", id: 22, name: "Get group to chant your name (10s+)", points: 5},
            {group: "5pt", id: 23, name: "Win arm-wrestling", points: 5},
            {group: "5pt", id: 24, name: "Start dance circle with 2+ strangers", points: 5},
            {group: "5pt", id: 25, name: "Get stranger to carry you for photo", points: 5},
            {group: "5pt", id: 26, name: "Recreate famous movie scene", points: 5},
            {group: "5pt", id: 27, name: "5+ strangers in same pose photo", points: 5},
            {group: "5pt", id: 28, name: "Pretend long-lost cousins video", points: 5},
            {group: "5pt", id: 29, name: "Create & perform secret handshake", points: 5},
            {group: "5pt", id: 30, name: "Bartender invents drink for you", points: 5}
        ];

        function saveName() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return alert("Enter your name");
            currentPlayer = name;
            localStorage.setItem('currentPlayer', name);
            renderChallenges();
        }

        function renderChallenges() {
            const container = document.getElementById('challengesList');
            if (!currentPlayer) return container.innerHTML = "<p style='text-align:center; padding:20px;'>Enter your name above to start.</p>";

            let html = `<h2>Welcome, ${currentPlayer}!</h2>`;

            const groups = { "1pt": [], "3pt": [], "5pt": [] };
            challenges.forEach(ch => groups[ch.group].push(ch));

            Object.keys(groups).forEach(group => {
                if (groups[group].length === 0) return;
                const pt = group === "1pt" ? 1 : group === "3pt" ? 3 : 5;
                html += `<div class="section"><div class="points-header">${pt} POINT CHALLENGES</div>`;
                
                groups[group].forEach(ch => {
                    const checked = (players[currentPlayer] && players[currentPlayer].challenges && players[currentPlayer].challenges[ch.id]) ? 'checked' : '';
                    html += `
                        <div class="challenge">
                            <input type="checkbox" ${checked} onchange="toggleChallenge(${ch.id}, this.checked)">
                            <label>${ch.name} <strong>(+${ch.points} pts)</strong></label>
                        </div>
                    `;
                });
                html += `</div>`;
            });

            container.innerHTML = html;

            const drinks = players[currentPlayer] && players[currentPlayer].drinks ? players[currentPlayer].drinks : 0;
            document.getElementById('drinkCount').value = drinks;
        }

        function toggleChallenge(id, completed) {
            if (!currentPlayer) return;
            if (!players[currentPlayer]) players[currentPlayer] = {challenges: {}, drinks: 0};
            if (!players[currentPlayer].challenges) players[currentPlayer].challenges = {};
            players[currentPlayer].challenges[id] = completed;
            saveToStorage();
        }

        function updateDrinks() {
            if (!currentPlayer) return;
            if (!players[currentPlayer]) players[currentPlayer] = {challenges: {}, drinks: 0};
            players[currentPlayer].drinks = parseInt(document.getElementById('drinkCount').value) || 0;
            saveToStorage();
        }

        function saveToStorage() {
            try { localStorage.setItem('pubCrawlPlayers', JSON.stringify(players)); } catch(e) {}
        }

        function calculateScore(playerName) {
            if (!players[playerName] || !players[playerName].challenges) return 0;
            let score = 0;
            Object.keys(players[playerName].challenges).forEach(id => {
                if (players[playerName].challenges[id]) {
                    const ch = challenges.find(c => c.id == id);
                    if (ch) score += ch.points;
                }
            });
            return score;
        }

        function submitProgress() {
            if (!currentPlayer) return alert("Enter name first");
            alert("✅ Progress saved!");
            refreshLeaderboard();
        }

        function refreshLeaderboard() {
            const board = document.getElementById('leaderboard');
            let html = '<table><tr><th>Rank</th><th>Player</th><th>Points</th><th>Drinks</th></tr>';
            
            const sorted = Object.keys(players)
                .map(name => ({
                    name, 
                    score: calculateScore(name),
                    drinks: players[name].drinks || 0
                }))
                .sort((a, b) => b.score - a.score);

            sorted.forEach((p, i) => {
                html += `<tr><td>${i+1}</td><td>${p.name}</td><td><strong>${p.score}</strong></td><td>${p.drinks}</td></tr>`;
            });
            
            html += '</table>';
            board.innerHTML = sorted.length ? html : '<p>No players yet. Start on My Progress tab!</p>';
        }

        function showTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            if (n === 2) refreshLeaderboard();
        }

        window.onload = () => {
            if (currentPlayer) {
                document.getElementById('playerName').value = currentPlayer;
                renderChallenges();
            }
            refreshLeaderboard();
        };
    </script>
</body>
</html>
