<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍻 Pub Crawl Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- Landing -->
    <div id="landing">
        <h1>🍻 Pub Crawl Challenge</h1>
        <p>Who's playing tonight?</p>
        <input
            type="text"
            id="playerName"
            placeholder="Enter your name"
        >
        <button id="startBtn">
            Start
        </button>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <header>
            <h2 id="welcome"></h2>
            <div class="stats">
                <div class="stat">
                    <span>🏆</span>
                    <h3 id="points">0</h3>
                    <p>Points</p>
                </div>
                <div class="stat">
                    <span>🍺</span>
                    <h3 id="drinks">0</h3>
                    <p>Drinks</p>
                </div>
                <div class="stat">
                    <span>✅</span>
                    <h3 id="progress">0/30</h3>
                    <p>Completed</p>
                </div>
            </div>
        </header>

        <!-- Top-level navigation -->
        <div class="tabs main-tabs">
            <button class="tab active" data-tab="challenges">🎯 Challenges</button>
            <button class="tab" data-tab="leaderboard">🏆 Leaderboard</button>
            <button class="tab" data-tab="drinks">🍺 Drinks</button>
        </div>

        <!-- Challenges panel -->
        <div id="challengesPanel" class="panel">
            <div class="tabs sub-tabs">
                <button class="subtab active" data-level="easy">Easy</button>
                <button class="subtab" data-level="medium">Medium</button>
                <button class="subtab" data-level="hard">Hard</button>
            </div>

            <div id="challengeList"></div>

            <button id="randomChallenge">
                🎲 Random Challenge
            </button>
        </div>

        <!-- Leaderboard panel -->
        <div id="leaderboardPanel" class="panel hidden">
            <div id="leaderboardList"></div>
        </div>

        <!-- Drinks panel -->
        <div id="drinksPanel" class="panel hidden">
            <div class="drink-display">
                <span class="drink-icon">🍺</span>
                <h2 id="drinksBig">0</h2>
                <p>drinks tonight</p>
            </div>
            <div class="drinkButtons">
                <button id="minusDrink">−</button>
                <button id="plusDrink">+</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase (compat build — no bundler needed, works on plain GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
