<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Crawl Challenge Tracker</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background: #172840; 
            color: #e0e0e0; 
        }
        h1 { text-align: center; color: #a0d8ff; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button { padding: 14px; margin: 8px 0; width: 100%; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #2a7de1; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #3a8ef2; }
        
        .section { background: #103152; padding: 18px; margin: 20px 0; border-radius: 12px; }
        .challenge { 
            display: flex; 
            align-items: flex-start; 
            padding: 14px; 
            background: #1e3a5f; 
            margin: 8px 0; 
            border-radius: 10px; 
        }
        .challenge input { margin-right: 15px; margin-top: 4px; transform: scale(1.5); flex-shrink: 0; }
        .challenge label { flex: 1; line-height: 1.4; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #103152; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a4a7a; }
        th { background: #2a7de1; color: white; }
        .tab { display: none; }
        .tab.active { display: block; }
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍻 ISA Pub Crawl Tracker</h1>
        <div class="nav">
            <button onclick="showTab(0)">My Progress</button>
            <button onclick="showTab(1)">1pt</button>
            <button onclick="showTab(2)">3pt</button>
            <button onclick="showTab(3)">5pt</button>
            <button onclick="showTab(4)">Leaderboard</button>
        </div>

        <!-- Main Progress -->
        <div id="tab0" class="tab active">
            <input type="text" id="playerName" placeholder="Your name / nickname" />
            <button onclick="saveName()">Join / Load Progress</button>
            <div id="allChallenges"></div>
            
            <div class="section" style="text-align:center;">
                🍺 Drinks: <input type="number" id="drinkCount" value="0" min="0" style="width:100px;" onchange="updateDrinks()">
            </div>
            <button onclick="submitProgress()" style="background:#00b36b;">✅ Save Progress</button>
        </div>

        <!-- 1 Point Tab -->
        <div id="tab1" class="tab"></div>
        <!-- 3 Point Tab -->
        <div id="tab2" class="tab"></div>
        <!-- 5 Point Tab -->
        <div id="tab3" class="tab"></div>

        <!-- Leaderboard -->
        <div id="tab4" class="tab">
            <button onclick="refreshLeaderboard()" style="margin-bottom:15px;">🔄 Refresh Leaderboard</button>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        let players = {};
        let currentPlayer = '';

        try {
            players = JSON.parse(localStorage.getItem('pubCrawlPlayers')) || {};
            currentPlayer = localStorage.getItem('currentPlayer') || '';
        } catch(e) {}

        const challenges = [ /* your full list from before */ ];

        // ... (full script logic - same as previous versions)

        function saveName() { /* same */ }
        function toggleChallenge(id, completed) { /* same */ }
        function updateDrinks() { /* same */ }
        function saveToStorage() { /* same */ }
        function calculateScore(playerName) { /* same */ }
        function submitProgress() { /* same */ }
        function refreshLeaderboard() { /* same */ }

        function showTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + n).classList.add('active');
            if (n === 4) refreshLeaderboard();
            if (n === 1 || n === 2 || n === 3) renderPointTab(n);
        }

        function renderPointTab(tab) {
            const pt = tab === 1 ? 1 : tab === 2 ? 3 : 5;
            const container = document.getElementById('tab' + tab);
            let html = `<div class="points-header">${pt} POINT CHALLENGES</div>`;
            
            const filtered = challenges.filter(c => c.points === pt);
            filtered.forEach(ch => {
                const checked = (players[currentPlayer] && players[currentPlayer].challenges && players[currentPlayer].challenges[ch.id]) ? 'checked' : '';
                html += `
                    <div class="challenge">
                        <input type="checkbox" ${checked} onchange="toggleChallenge(${ch.id}, this.checked)">
                        <label>${ch.name} <strong>(+${ch.points} pts)</strong></label>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = () => {
            if (currentPlayer) {
                document.getElementById('playerName').value = currentPlayer;
            }
            // Render main progress tab
            // (add renderAllChallenges() if you want a full view)
            refreshLeaderboard();
        };
    </script>
</body>
</html>
