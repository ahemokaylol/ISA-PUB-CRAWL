<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Pub Crawl Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🍻 ISA Pub Crawl Tracker</h1>
        
        <div class="nav">
            <button onclick="showMain()">Home</button>
            <button onclick="showChallenges()">Challenges</button>
            <button onclick="showLeaderboard()">Leaderboard</button>
        </div>

        <!-- Home -->
        <div id="homeScreen">
            <input type="text" id="playerName" placeholder="Your name / nickname" />
            <button onclick="saveName()">Join / Load Progress</button>
            <div id="welcomeMessage"></div>
            
            <div class="drinks-box">
                🍺 Drinks: <input type="number" id="drinkCount" value="0" min="0" onchange="updateDrinks()">
            </div>
            <button onclick="submitProgress()" class="save-btn">✅ Save Progress</button>
        </div>

        <!-- Challenges Screen -->
        <div id="challengesScreen" class="screen">
            <div class="sub-nav">
                <button onclick="showPointTab(1)" class="point-btn">1 Point</button>
                <button onclick="showPointTab(3)" class="point-btn">3 Points</button>
                <button onclick="showPointTab(5)" class="point-btn">5 Points</button>
            </div>
            <div id="pointContent"></div>
        </div>

        <!-- Leaderboard -->
        <div id="leaderboardScreen" class="screen">
            <button onclick="refreshLeaderboard()" class="refresh-btn">🔄 Refresh Leaderboard</button>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
